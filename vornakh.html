<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vornakh - VTuber</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#070b14;
  color:white;
}

/* BACK BUTTON */
.back-btn{
  position:absolute;
  top:20px;
  left:20px;
  padding:10px 14px;
  background:#2563eb;
  color:white;
  text-decoration:none;
  border-radius:10px;
  transition:0.2s;
  font-size:14px;
  z-index:10;
}

.back-btn:hover{
  background:#3b82f6;
  transform:scale(1.05);
}

/* BANNER */
.banner{
  width:100%;
  height:220px;
  object-fit:cover;
  filter:brightness(0.6);
  display:block;
}

/* PROFILE BLOCK */
.profile{
  text-align:center;
  margin-top:-70px;
  padding-bottom:20px;
}

/* AVATAR */
.avatar{
  width:160px;
  height:160px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid #3b82f6;
  box-shadow:0 0 25px rgba(59,130,246,0.6);
  background:#111827;
}

/* NAME */
h1{
  margin-top:15px;
  font-size:42px;
  text-shadow:0 0 15px #3b82f6;
}

/* SUBTITLE */
.subtitle{
  color:#d1d5db;
  margin-top:8px;
}

/* MAIN */
main{
  max-width:1000px;
  margin:auto;
  padding:40px 20px;
}

.card{
  background:#1f2937;
  padding:25px;
  border-radius:18px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.1);
}

h2{
  color:#60a5fa;
  margin-top:0;
}

ul{
  line-height:1.8;
  color:#d1d5db;
}

</style>
</head>

<body>

<!-- BACK -->
<a class="back-btn" href="index.html">⬅ Retour</a>

<!-- PROFILE -->
<div class="profile">

  <img class="avatar" src="vornakh.jpg" alt="avatar VTuber">

  <h1>Vornakh</h1>
  <p class="subtitle">VTuber francophone - Gaming</p>

</div>

<!-- CONTENT -->
<main>

  <div class="card">

    <h2>📌 Informations</h2>

    <ul>
      <li><strong>Nom :</strong> Vornakh</li>
      <li><strong>Type :</strong> VTuber FR</li>
      <li><strong>Contenu :</strong> Gaming / Stream</li>
      <li><strong>Langue :</strong> Français</li>
      <li><strong>Statut :</strong> Actif</li>
    </ul>

  </div>

  <div class="card">

    <h2>📖 Description</h2>

    <p>
      Description du VTuber ici.
      Son lore, son style et son univers.
    </p>

  </div>

</main>

</body>
</html>
