<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTubers FR</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#0b1220;
      color:white;
    }

    header{
      padding:40px;
      text-align:center;
      background:#111827;
      border-bottom:2px solid rgba(255,255,255,0.1);
    }

    h1{
      margin:0;
      font-size:40px;
      text-shadow:0 0 15px #3b82f6;
    }

    .search-box{
      margin-top:20px;
    }

    input{
      width:60%;
      max-width:500px;
      padding:12px;
      border-radius:10px;
      border:none;
      outline:none;
      font-size:16px;
    }

    /* BOUTON RETOUR */
    .back-btn{
      display:inline-block;
      margin-top:15px;
      padding:10px 16px;
      background:#2563eb;
      color:white;
      text-decoration:none;
      border-radius:10px;
      transition:0.2s;
      font-size:14px;
    }

    .back-btn:hover{
      background:#3b82f6;
      transform:scale(1.05);
    }

    main{
      max-width:1200px;
      margin:auto;
      padding:40px 20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
    }

    .card{
      background:#1f2937;
      padding:15px;
      border-radius:15px;
      text-align:center;
      transition:0.25s;
      border:1px solid rgba(255,255,255,0.1);
    }

    .card:hover{
      transform:scale(1.06);
      box-shadow:0 0 25px rgba(59,130,246,0.6);
      border-color:#3b82f6;
    }
    .card-avatar{
  width:100px;
  height:100px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid #3b82f6;
  margin-bottom:15px;
  box-shadow:0 0 15px rgba(59,130,246,0.5);
}

    a{
      color:#60a5fa;
      text-decoration:none;
    }

    .tag{
      display:inline-block;
      margin-top:8px;
      padding:3px 8px;
      font-size:12px;
      border-radius:8px;
      background:#2563eb;
    }

  </style>
</head>

<body>

<header>

  <h1>📚 Liste des VTubers FR</h1>

  <!-- BOUTON RETOUR -->
  <a href="index.html" class="back-btn">⬅ Retour accueil</a>
  <a href="https://docs.google.com/forms/d/e/1FAIpQLSdSmfPj84u_YS280zeEOqDHQV8BoXShhTtpSrfMqLBk71m68w/viewform?usp=publish-editor" class="back-btn">
  ➕ Proposer une page
</a>

  <div class="search-box">
    <input type="text" id="search" placeholder="Rechercher un VTuber...">
  </div>

</header>

<main>

  <div class="grid" id="list">

    <div class="card"
      <img src="vornakhprofil.png" class="card-avatar">
      <h3 class="name">Vornakh</h3>
      <span class="tag">Gaming</span>
      <br><br>
      <a href="vornakh.html">Voir profil</a>
    </div>

    <div class="card">
      <h3 class="name">Amelie</h3>
      <span class="tag">IRL</span>
      <br><br>
      <a href="amelie.html">Voir profil</a>
    </div>

    <div class="card">
      <h3 class="name">Kirari</h3>
      <span class="tag">Musique</span>
      <br><br>
      <a href="kirari.html">Voir profil</a>
    </div>

  </div>

</main>

<script>

  const search = document.getElementById("search");
  const cards = document.querySelectorAll(".card");

  search.addEventListener("input", function(){

    const value = this.value.toLowerCase();

    cards.forEach(card => {

      const name = card.querySelector(".name").textContent.toLowerCase();

      if(name.includes(value)){
        card.style.display = "";
      } else {
        card.style.display = "none";
      }

    });

  });

</script>

</body>
</html>
